<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Link bio Fin505 berisi Discord dan Saweria.">
  <title>Fin505 | Link Bio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #22c55e;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.16), transparent 30%),
        linear-gradient(160deg, #020617 0%, #0f172a 55%, #111827 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 420px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .avatar {
      width: 84px;
      height: 84px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.28);
    }

    h1 {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1.15;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      border: 1px solid rgba(148, 163, 184, 0.18);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .link-btn span {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0.9;
    }

    .link-btn strong {
      display: block;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.45);
      outline: none;
    }

    .discord {
      background: linear-gradient(135deg, rgba(88, 101, 242, 0.92), rgba(59, 130, 246, 0.82));
    }

    .saweria {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.92), rgba(16, 185, 129, 0.82));
    }

    .hint {
      margin-top: 18px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .hint strong {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">F</div>
    <h1>Fin505</h1>
    <p>Semua link penting ada di bawah. Cocok untuk dipasang di bio TikTok.</p>

    <section class="links" aria-label="Link sosial dan donasi">
      <a class="link-btn discord" href="https://discord.gg/SBACeBQNB" target="_blank" rel="noopener noreferrer">
        <span>Gabung ke</span>
        <strong>Discord</strong>
      </a>
      <a class="link-btn saweria" href="https://saweria.co/Fin505" target="_blank" rel="noopener noreferrer">
        <span>Dukung lewat</span>
        <strong>Saweria</strong>
      </a>
    </section>

    <div class="hint">Link bio TikTok: <strong>taruh URL halaman ini</strong> di bio kamu setelah dipublish.</div>
  </main>
</body>
</html>
